name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agent
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      POSTGRES_TEST_URL: jdbc:postgresql://localhost:5432/agent?user=agent&password=agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (the baseline consumers need)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with caching + wrapper validation)
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace
