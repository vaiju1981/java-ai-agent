name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: agent
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      POSTGRES_TEST_URL: jdbc:postgresql://localhost:5432/agent?user=agent&password=agent
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history (Codecov + SonarCloud blame)

      - name: Set up JDK 21 (the baseline consumers need)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with caching + wrapper validation)
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace

      # Coverage + quality run only when their secrets are configured, so the build stays green
      # until you add them (and on forks that have no secrets).
      # Runs only when CODECOV_TOKEN is configured, so the build stays green until then.
      # (Code quality is handled by SonarCloud's automatic analysis via its GitHub App.)
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # The per-module jacocoTestReport.xml files are discovered automatically.
