name: Dependency submission

# Submits the Gradle dependency graph to GitHub so Dependabot can flag vulnerable
# (including transitive) dependencies. Runs ONLY on push to the default branch:
# the graph is consumed from the default branch alone, so running it on PRs adds no
# value and only burns CI.
#
# This replaces GitHub's built-in "Automatic dependency submission" feature, which
# fires on every push that touches a Gradle manifest -- on any branch, so its failures
# land on the corresponding PR as a spurious red X -- and which has no workflow file
# to event-filter, pin, or configure. Turn that feature off so this workflow is the
# single source of the graph: Settings -> Advanced Security -> Dependency graph ->
# "Automatic dependency submission" -> Disabled.

on:
  push:
    branches: [ main ]

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

# Submitting a dependency snapshot writes to the repository's dependency graph.
permissions:
  contents: write

jobs:
  submit:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21 (matches the build baseline)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # Resolves the build's dependencies and submits the graph via the Dependency
      # Submission API. Bundles its own Gradle setup, so no separate setup-gradle step.
      #
      # exclude-projects: resolving :agent-store-sqlite trips a known upstream bug in
      # the dependency-graph plugin ("Failed to notify build listener. > Index -1 out
      # of bounds for length 0") that aborts report generation for the WHOLE build, so
      # nothing is submitted. (dependency-graph-continue-on-failure can't help -- the
      # crash is in the listener that writes the report, so no partial report exists to
      # fall back on; verified.) Skipping just that one project lets every other module
      # resolve and submit; sqlite-jdbc itself is still tracked via :agent-store-jdbc.
      # Drop this exclusion once the upstream bug is fixed.
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
        with:
          dependency-graph-exclude-projects: ':agent-store-sqlite'
