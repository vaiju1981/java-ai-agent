name: Security scan

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

# Cancel superseded runs on the same ref.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy (deps + config + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Self-contained scan: prints findings to the job log. (Uploading SARIF to the Security tab
      # requires GitHub code scanning to be enabled on the repo; this avoids that dependency.)
      - name: Trivy filesystem scan (vulnerabilities + misconfig + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          scanners: vuln,misconfig,secret
          ignore-unfixed: true
          format: table
          # Report-only so CI stays green; set exit-code to '1' to make findings block the build.
          exit-code: '0'
