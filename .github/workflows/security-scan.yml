name: Security scan

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab (free code scanning on a public repo)

jobs:
  trivy:
    name: Trivy (deps + config + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Trivy filesystem scan (vulnerabilities + misconfig + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          scanners: vuln,misconfig,secret
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          # Gate the PR on FIXABLE critical/high findings (ignore-unfixed above); the SARIF still uploads
          # to the Security tab via the always() step below even when this fails.
          exit-code: '1'

      - name: Upload results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
