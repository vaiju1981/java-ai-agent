name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the GitHub Release
  pages: write      # deploy Javadoc to GitHub Pages
  id-token: write   # required by the Pages deployment

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - name: Derive version from the tag (v1.2.3 -> 1.2.3)
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release artifacts + aggregate Javadoc
        run: ./gradlew build aggregateJavadoc --no-daemon --stacktrace

      # Signs and uploads all module artifacts to the Central Portal as one deployment
      # (USER_MANAGED — review and release it in the Central Portal UI). Runs only when configured.
      - name: Publish to Maven Central (Central Portal)
        if: ${{ env.CENTRAL_USERNAME != '' }}
        run: ./gradlew publishAggregationToCentralPortal --no-daemon --stacktrace

      - name: Create GitHub Release (with artifacts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jars=$(find . -path '*/build/libs/*.jar' | tr '\n' ' ')
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $jars

      - name: Upload Javadoc as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/javadoc

      - name: Deploy Javadoc to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v5
