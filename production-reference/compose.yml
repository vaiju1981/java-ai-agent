services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - agent-postgres:/var/lib/postgresql/data

volumes:
  agent-postgres:
