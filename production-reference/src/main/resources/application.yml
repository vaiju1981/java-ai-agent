spring:
  application:
    name: java-ai-agent-reference
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agent}
    username: ${DATABASE_USER:agent}
    password: ${DATABASE_PASSWORD:agent}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    async:
      request-timeout: 95s

server:
  shutdown: graceful
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

agent:
  ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}
  history-turns: ${AGENT_HISTORY_TURNS:20}
  request-timeout: ${AGENT_REQUEST_TIMEOUT:90s}
  model-timeout: ${AGENT_MODEL_TIMEOUT:60s}
  tool-timeout: ${AGENT_TOOL_TIMEOUT:15s}
  audit-file: ${AGENT_AUDIT_FILE:var/audit/agent-events.log}
