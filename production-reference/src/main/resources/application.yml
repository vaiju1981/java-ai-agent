spring:
  application:
    name: java-ai-agent-reference
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agent}
    username: ${DATABASE_USER:agent}
    # Local-dev default only; configurationWarnings logs a warning if left at 'agent'. Override in prod.
    password: ${DATABASE_PASSWORD:agent}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}
      connection-timeout: 5000
      max-lifetime: 600000
      validation-timeout: 2000
      # Logs a stack trace if a borrowed connection isn't returned in time — cheap insurance.
      leak-detection-threshold: 10000
  flyway:
    enabled: true
    # agent-store-jdbc ships its schema under its own namespaced location (NOT the default
    # classpath:db/migration), so the library never squats a consumer's migration version space.
    # Add your own app migrations as an extra location, e.g.:
    #   locations: classpath:db/agent-store-jdbc,classpath:db/migration
    locations: classpath:db/agent-store-jdbc
  mvc:
    async:
      request-timeout: 95s

server:
  shutdown: graceful
  error:
    include-message: never

logging:
  pattern:
    # Correlate request-scoped logs with the audit trail by trace id.
    level: "%5p [trace=%X{traceId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Readiness also reflects model reachability, so a model outage drains the instance from the LB.
    group:
      readiness:
        include: readinessState,db,model

agent:
  ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}
  # Optional Llama Guard model; blank runs crisis + PII guardrails only (a startup warning is logged).
  guard-model: ${AGENT_GUARD_MODEL:}
  history-turns: ${AGENT_HISTORY_TURNS:20}
  request-timeout: ${AGENT_REQUEST_TIMEOUT:90s}
  model-timeout: ${AGENT_MODEL_TIMEOUT:60s}
  tool-timeout: ${AGENT_TOOL_TIMEOUT:15s}
  audit-file: ${AGENT_AUDIT_FILE:var/audit/agent-events.log}
  # Edge protection. api-keys maps each key to the tenant it authenticates, so the tenant is bound to the
  # credential rather than asserted by a client header (empty = unauthenticated, with a startup warning;
  # required under the 'prod' profile). Configure as a YAML map, e.g.:
  #   api-keys:
  #     "key-for-acme": "acme"
  #     "key-for-globex": "globex"
  api-keys: {}
  rate-limit-per-minute: ${AGENT_RATE_LIMIT_PER_MINUTE:120}
  max-request-bytes: ${AGENT_MAX_REQUEST_BYTES:65536}
  # Self-learning (opt-in, default off): wrap the unary agent in a ReflectiveAgent that recalls lessons
  # from past episodes (durable + semantic, via JdbcEpisodicStore in the agent_episodes table) and
  # self-corrects on a poor answer. Needs an embedding model (e.g. nomic-embed-text) pulled in Ollama;
  # with self-learning on but no embedding-model set, it logs a warning and stays off.
  self-learning: ${AGENT_SELF_LEARNING:false}
  embedding-model: ${AGENT_EMBEDDING_MODEL:}
