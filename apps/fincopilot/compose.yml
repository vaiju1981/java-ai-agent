services:
  postgres:
    # pgvector image (superset of Postgres) so the M2 RAG retriever works without a later swap.
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: fincopilot
      POSTGRES_USER: fincopilot
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-fincopilot}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fincopilot"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - fincopilot-postgres:/var/lib/postgresql/data

  app:
    build:
      context: ../..
      dockerfile: apps/fincopilot/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/fincopilot
      DATABASE_USER: fincopilot
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-fincopilot}
      # Ollama runs on the host by default. gemma4:31b-cloud needs the host Ollama signed in to Ollama cloud.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:31b-cloud}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  web:
    # The React SPA, served by nginx, which proxies /api to the app service. Browse http://localhost:3000.
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - app
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  fincopilot-postgres:
