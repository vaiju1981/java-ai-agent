<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="660" rx="0" fill="#0f172a"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="22" font-weight="700">FinCopilot — one chat turn, powered by java-ai-agent</text>
  <text x="40" y="64" fill="#94a3b8" font-size="13">Every box is framework code; the app only wires beans. The model's tools are governed, not trusted.</text>

  <!-- Browser -->
  <rect x="40" y="92" width="280" height="62" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="180" y="120" fill="#38bdf8" font-size="15" font-weight="700" text-anchor="middle">Browser — React SPA</text>
  <text x="180" y="140" fill="#94a3b8" font-size="12" text-anchor="middle">streaming chat · inline charts · approve/reject</text>

  <!-- Starter web plumbing -->
  <rect x="40" y="190" width="280" height="64" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="180" y="216" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">ChatController → AgentTurns</text>
  <text x="180" y="236" fill="#94a3b8" font-size="11.5" text-anchor="middle">agent-spring-boot-starter: validate · SSE · MDC</text>

  <!-- Runtime container -->
  <rect x="40" y="290" width="600" height="330" rx="12" fill="#0b1f33" stroke="#1d4e6b"/>
  <text x="60" y="316" fill="#38bdf8" font-size="14" font-weight="700">ProductionAgentRuntime — agent-core (governed loop)</text>

  <!-- input guardrails -->
  <rect x="64" y="330" width="552" height="42" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="340" y="356" fill="#e2e8f0" font-size="13" text-anchor="middle">Input guardrails — InjectionGuardrail · PiiScrub · Crisis</text>

  <!-- model call -->
  <rect x="64" y="386" width="552" height="42" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="340" y="412" fill="#e2e8f0" font-size="13" text-anchor="middle">ResilientModelPort → ModelPort (timeout · retries)</text>

  <!-- tool loop -->
  <rect x="64" y="442" width="552" height="86" rx="8" fill="#13314a" stroke="#334155"/>
  <text x="340" y="463" fill="#cbd5e1" font-size="12.5" font-weight="700" text-anchor="middle">tool loop (max-steps)</text>
  <rect x="80" y="474" width="150" height="42" rx="7" fill="#1e293b" stroke="#334155"/>
  <text x="155" y="496" fill="#e2e8f0" font-size="12" text-anchor="middle">ToolSelector</text>
  <rect x="246" y="474" width="150" height="42" rx="7" fill="#1e293b" stroke="#334155"/>
  <text x="321" y="492" fill="#e2e8f0" font-size="12" text-anchor="middle">ToolApprover</text>
  <text x="321" y="508" fill="#94a3b8" font-size="10.5" text-anchor="middle">deny-effectful</text>
  <rect x="412" y="474" width="188" height="42" rx="7" fill="#1e293b" stroke="#334155"/>
  <text x="506" y="492" fill="#e2e8f0" font-size="12" text-anchor="middle">StructuredTool / ContextualTool</text>
  <text x="506" y="508" fill="#94a3b8" font-size="10.5" text-anchor="middle">per-user, scoped by context</text>
  <line x1="230" y1="495" x2="246" y2="495" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="396" y1="495" x2="412" y2="495" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- output guardrails -->
  <rect x="64" y="542" width="552" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="340" y="567" fill="#e2e8f0" font-size="13" text-anchor="middle">Output guardrails — nothing unsafe reaches the user</text>

  <text x="64" y="604" fill="#64748b" font-size="11.5">persisted per turn → ConversationStore · AuditSink</text>

  <!-- vertical arrows in main column -->
  <line x1="180" y1="154" x2="180" y2="190" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="254" x2="180" y2="290" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="340" y1="372" x2="340" y2="386" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="428" x2="340" y2="442" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="528" x2="340" y2="542" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Collaborators on the right -->
  <rect x="700" y="386" width="240" height="42" rx="9" fill="#1e293b" stroke="#334155"/>
  <text x="820" y="404" fill="#34d399" font-size="12.5" font-weight="700" text-anchor="middle">Ollama</text>
  <text x="820" y="420" fill="#94a3b8" font-size="11" text-anchor="middle">gemma4:31b-cloud (all roles)</text>
  <line x1="616" y1="407" x2="700" y2="407" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="700" y="466" width="240" height="58" rx="9" fill="#3b2f1a" stroke="#f59e0b"/>
  <text x="820" y="490" fill="#fde68a" font-size="12.5" font-weight="700" text-anchor="middle">Human approval</text>
  <text x="820" y="508" fill="#fde68a" font-size="11" text-anchor="middle">ApprovalHandler · Approve / Reject</text>
  <line x1="396" y1="486" x2="700" y2="490" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowAmber)"/>

  <rect x="700" y="556" width="240" height="44" rx="9" fill="#1e293b" stroke="#334155"/>
  <text x="820" y="574" fill="#e2e8f0" font-size="12" text-anchor="middle">Postgres / pgvector</text>
  <text x="820" y="590" fill="#94a3b8" font-size="10.5" text-anchor="middle">conversations · ledger · goals</text>
  <line x1="616" y1="585" x2="700" y2="582" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SSE return path -->
  <path d="M660 300 H958 V120 H320" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="2 0" marker-end="url(#arrow)" opacity="0.85"/>
  <text x="958" y="210" fill="#38bdf8" font-size="11.5" text-anchor="end" transform="rotate(90 958 210)">SseAgentObserver → SSE</text>
  <text x="690" y="112" fill="#94a3b8" font-size="11" text-anchor="middle">tool · tool_data · approval_required · final</text>
</svg>
