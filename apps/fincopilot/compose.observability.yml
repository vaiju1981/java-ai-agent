# Observability overlay — Prometheus + Grafana for the FinCopilot stack. Compose merges this with the
# base stack, so Prometheus reaches the app by its service name on the shared network. Run with:
#
#   docker compose -f compose.yml -f compose.observability.yml up --build
#
# Then open Grafana at http://localhost:3001 (admin / ${GRAFANA_ADMIN_PASSWORD:-admin}); the FinCopilot
# dashboard and Prometheus datasource are auto-provisioned. Prometheus UI is at http://localhost:9090.
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
