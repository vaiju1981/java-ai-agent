# Prometheus scrape config for the FinCopilot observability overlay (compose.observability.yml).
# Scrapes the app's Micrometer/Actuator endpoint; agent.* meters come from MicrometerAgentObserver.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: fincopilot
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8080"]
        labels:
          service: fincopilot
