spring:
  application:
    name: fincopilot
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fincopilot}
    username: ${DATABASE_USER:fincopilot}
    # Local-dev default only. Override DATABASE_PASSWORD in any real deployment.
    password: ${DATABASE_PASSWORD:fincopilot}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}
      connection-timeout: 5000
      max-lifetime: 600000
      validation-timeout: 2000
      leak-detection-threshold: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    async:
      request-timeout: 95s

server:
  shutdown: graceful
  error:
    include-message: never

logging:
  pattern:
    # traceId/sessionId/principal/tenant are bound to the MDC per turn (see AgentTurns). For JSON logs
    # set LOGGING_STRUCTURED_FORMAT_CONSOLE=ecs (or logstash); the MDC fields are then emitted as fields.
    level: "%5p [trace=%X{traceId:-} session=%X{sessionId:-} user=%X{principal:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    group:
      # Readiness drains an instance from the load balancer when the DB or Ollama backend is unreachable.
      readiness:
        include: readinessState,db,ollama
  metrics:
    distribution:
      # Publish a latency histogram for HTTP requests so dashboards can compute p95/p99 (scoped to this
      # one meter to keep cardinality in check).
      percentiles-histogram:
        http.server.requests: true

fincopilot:
  # LLM substrate: Ollama, one model for all roles (see the v0.2.0 plan).
  ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma4:31b-cloud}
  history-turns: ${FINCOPILOT_HISTORY_TURNS:20}
  request-timeout: ${FINCOPILOT_REQUEST_TIMEOUT:90s}
  audit-file: ${FINCOPILOT_AUDIT_FILE:var/audit/fincopilot-events.log}
  # Per-user daily request quota on the chat endpoints (0 disables).
  daily-request-quota: ${FINCOPILOT_DAILY_REQUEST_QUOTA:200}
  # Ollama embedding model for semantic retrieval; blank uses the offline hashing embedder.
  embed-model: ${FINCOPILOT_EMBED_MODEL:nomic-embed-text-v2-moe}
  # Per-IP throttle on the public auth endpoints, per minute (0 disables).
  auth-attempts-per-minute: ${FINCOPILOT_AUTH_ATTEMPTS_PER_MINUTE:20}

# The governed agent's own knobs (agent-spring-boot-starter).
agent:
  system-prompt: >-
    You are FinCopilot, a careful, grounded finance assistant for individuals and small businesses.
    You provide general information and analysis, not regulated financial, investment, or tax advice.
    Use the analytics tools to answer questions about the user's own numbers; never invent numbers or
    tool results. For budgeting, saving, debt, or other guidance questions, call guidance_search and
    ground your answer in the returned passages, citing their source titles in [brackets]. Always add a
    brief reminder that this is general information, not personalized advice, and suggest consulting a
    qualified professional for major decisions.
    When the user asks to set or create a savings goal, call set_savings_goal with the name and target
    amount (and a target date if given). It changes the user's data, so it needs their approval — the
    system will ask them to confirm before it takes effect; do not claim the goal is set until it succeeds.
  model-timeout: ${FINCOPILOT_MODEL_TIMEOUT:60s}
  tool-timeout: ${FINCOPILOT_TOOL_TIMEOUT:15s}
  max-steps: ${FINCOPILOT_MAX_STEPS:8}
